name: Deploy SB Claveria Portal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test backend ──────────────────────────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend      # all steps run inside backend/ by default

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache: option — avoids lock-file scanning errors

      - name: Install dependencies
        # --omit=optional skips better-sqlite3 native compile entirely
        # sql.js (pure JS) is used automatically as the fallback
        run: npm install --omit=optional

      - name: Run test suite
        run: node tests/run.js
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_jwt_secret
          SESSION_SECRET: ci_test_session_secret

  # ── Deploy backend → Render ───────────────────────────────────────────────
  deploy-backend:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Render deploy triggered."
          else
            echo "Skipping — RENDER_DEPLOY_HOOK_URL secret not set."
          fi

  # ── Deploy frontend → GitHub Pages ───────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
